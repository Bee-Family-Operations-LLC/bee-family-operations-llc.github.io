<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bee Family Operations | Institutional Dashboard</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --link-color: #58a6ff;
            --header-bg: #161b22;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        h1 { font-size: 1.5rem; font-weight: 600; color: #fff; margin: 0; }
        p { color: var(--text-muted); font-size: 0.9rem; margin-top: 5px; }

        .file-list {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
        }

        .file-row {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            text-decoration: none;
            color: var(--link-color);
            background: var(--header-bg);
            font-family: monospace;
            font-size: 0.95rem;
        }

        .file-row:last-child { border-bottom: none; }
        .file-row:hover { background: #1f242c; text-decoration: underline; }
        .file-row::before { content: "📄"; margin-right: 10px; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Bee Family Operations LLC</h1>
            <p>Independent Administrative Frameworks</p>
        </header>

        <div class="file-list">
            <a href="README.md" class="file-row">README.md</a>
            <a href="docs/fiduciary-methodology.md" class="file-row">docs/fiduciary-methodology.md</a>
            <a href="docs/e24-vault-overview.md" class="file-row">docs/e24-vault-overview.md</a>
            <a href="docs/audit-hash-utility.md" class="file-row">docs/audit-hash-utility.md</a>
        </div>
    </div>
</body>
</html>
