<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bee Family Operations | Institutional Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-start: #0f172a;
            --bg-end: #020617;
            --card-bg: rgba(30, 41, 59, 0.6);
            --text-main: #f1f5f9;
            --accent: #38bdf8;
            --border: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, var(--bg-start), var(--bg-end));
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 80px; /* More breathing room */
        }

        .container {
            max-width: 1100px; /* Much wider layout */
            margin: 0 auto;
        }

        header { 
            border-bottom: 2px solid var(--accent); 
            margin-bottom: 60px; 
            padding-bottom: 30px; 
        }

        h1 { 
            font-size: 3rem; 
            font-weight: 700; 
            margin: 0; 
            color: #fff; 
        }

        p { 
            font-size: 1.2rem; 
            color: #94a3b8; 
            margin-top: 10px; 
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 25px; 
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: 0.3s;
        }

        .card:hover { 
            border-color: var(--accent); 
            background: rgba(30, 41, 59, 0.9);
            transform: translateY(-10px);
        }

        .card span { font-size: 1.5rem; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Bee Family Operations LLC</h1>
            <p>Independent Administrative Frameworks & Institutional Integrity</p>
        </header>
        <div class="grid">
            <a href="README.md" class="card"><span>Institutional Overview</span></a>
            <a href="docs/fiduciary-methodology.md" class="card"><span>Fiduciary Methodology</span></a>
            <a href="docs/e24-vault-overview.md" class="card"><span>E-24 Vault Overview</span></a>
            <a href="scripts/audit-hash.ps1" class="card"><span>Digital Integrity Utility</span></a>
        </div>
    </div>
</body>
</html>
